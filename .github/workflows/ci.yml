name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod

      - name: Download deps
        run: go mod download

      - name: Verify generated files
        run: |
          go mod tidy
          go generate ./...
          git diff --exit-code

      - name: Check gofmt
        run: |
          git ls-files '*.go' | xargs gofmt -w
          git diff --exit-code

      - name: Go vet
        run: go vet ./...

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

      - name: Go test
        run: go test -count=1 ./...

      - name: Go test (race)
        run: go test -race -count=1 ./...
