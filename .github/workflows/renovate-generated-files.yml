name: Renovate generated files

permissions:
  actions: write
  contents: write

on:
  pull_request_target:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  refresh-generated-files:
    if: >-
      github.actor == 'renovate[bot]' &&
      github.event.pull_request.user.login == 'renovate[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'renovate/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Renovate branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Refresh generated files
        run: |
          go mod tidy
          go generate ./...
          bash scripts/gen-third-party-notices.sh

      - name: Commit generated file updates
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet --exit-code; then
            echo "No generated file updates needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum THIRD_PARTY_NOTICES.md
          git commit -m "chore(deps): refresh generated files"
          git push origin "HEAD:${HEAD_REF}"
          gh workflow run ci.yml --ref "${HEAD_REF}"
